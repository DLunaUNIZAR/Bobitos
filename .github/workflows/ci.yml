name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-quality:
    name: Android quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Deja disponible sdkmanager y acepta licencias para que AGP pueda
      # descargar el platform/build-tools de compileSdk 37 si el runner no lo trae.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # El build debug no necesita google-services.json (el plugin solo se aplica
      # si el archivo existe) ni firma, así que no hacen falta secretos en CI.
      - name: ktlint
        run: ./gradlew ktlintCheck

      - name: detekt
        run: ./gradlew detekt

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Android Lint
        run: ./gradlew lintDebug

      - name: Assemble debug
        run: ./gradlew assembleDebug

      - name: Coverage report (Kover)
        run: ./gradlew koverXmlReport

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            app/build/reports/ktlint/**
            app/build/reports/detekt/**
            app/build/reports/kover/**
            app/build/reports/lint-results-*.*
          if-no-files-found: ignore

  firebase-rules:
    name: Firebase rules (emulator)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # El Emulator Suite de Firestore necesita Java.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('package-lock.json') }}
          restore-keys: firebase-emulators-

      - name: Install dependencies
        run: npm ci

      # Ejecuta la suite de reglas contra el proyecto ficticio demo-bobitos: sin secretos.
      - name: Firestore rules tests
        run: npm run test:emulators
